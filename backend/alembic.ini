# Alembic configuration for the GSR backend.
#
# The database URL is intentionally NOT set here. It is resolved at runtime by
# alembic/env.py from app.config.settings (the same source as core/database.py),
# keeping a single source of truth for the connection string.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# Migration file naming: zero-padded revision slug, e.g. 0001_init.py
file_template = %%(rev)s_%%(slug)s

# Use UTC for the timestamps Alembic embeds in revisions.
timezone = UTC

[post_write_hooks]
# Format newly generated migrations with ruff (matches project style).
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
