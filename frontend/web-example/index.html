<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GSR Market Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script>
// Suppress defaultProps deprecation warnings from Recharts (third-party).
(function(){
  const _err = console.error;
  console.error = function(...args){
    const s = typeof args[0] === "string" ? args[0] : "";
    if (s.includes("defaultProps will be removed")) return;
    _err.apply(console, args);
  };
})();
</script>

<script src="mocks.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function parseHash() {
  const h = (location.hash || "#/").slice(1);
  const parts = h.split("/").filter(Boolean);
  return { route: parts[0] || "dashboard", param: parts[1] || null };
}

function Shell({ children, route }) {
  const nav = [
    { id: "dashboard",   href: "#/dashboard",   label: "Dashboard",   icon: "layout-dashboard" },
    { id: "markets",     href: "#/markets",     label: "Markets",     icon: "trending-up" },
    { id: "contracts",   href: "#/contracts",   label: "Explorer",    icon: "search" },
    { id: "resolutions", href: "#/resolutions", label: "Resolutions", icon: "scale" },
    { id: "signals",     href: "#/signals",     label: "Signals",     icon: "git-branch" },
    { id: "ecosystem",   href: "#/ecosystem",   label: "Ecosystem",   icon: "globe" },
  ];
  return (
    <div className="app">
      <aside className="sidebar expanded">
        <div style={{ padding: "16px 16px 8px" }}>
          <div className="brand">
            <div className="brand-mark">G</div>
            <div>
              <div className="brand-name">GSR · MI</div>
              <div className="brand-sub">Market Intel</div>
            </div>
          </div>
        </div>
        <div style={{ height: 12 }}/>
        {nav.map(n => (
          <a key={n.id} href={n.href} className={"nav-item " + (route === n.id ? "active" : "")}>
            <Icon name={n.icon} size={18}/>
            <span className="nav-label">{n.label}</span>
          </a>
        ))}
        <div className="nav-spacer"/>
        <div className="nav-divider"/>
        <a href="#/settings" className={"nav-item " + (route === "settings" ? "active" : "")}>
          <Icon name="settings" size={18}/>
          <span className="nav-label">Settings</span>
        </a>
        <a href="#/login" className="nav-item" title="Sign out">
          <Icon name="key" size={18}/>
          <span className="nav-label">Sign out</span>
        </a>
      </aside>
      <div className="main">
        <header className="topbar">
          <div className="brand" style={{ minWidth: 0 }}>
            <span className="brand-sub">Polygon · Live</span>
          </div>
          <div className="search-wrap">
            <Icon name="search" size={14} color="var(--text-muted)"/>
            <input className="search-input" placeholder="Search markets, addresses, questions… (Cmd+K)"/>
            <span className="kbd">⌘K</span>
          </div>
          <div className="topbar-right">
            <button className="icon-btn notif-dot" title="Notifications"><Icon name="bell" size={16}/></button>
            <button className="icon-btn" title="Theme"><Icon name="moon" size={16}/></button>
            <div className="user-chip">
              <div className="avatar">MO</div>
              <div style={{ display: "flex", flexDirection: "column", lineHeight: 1.2 }}>
                <span style={{ fontSize: 12, fontWeight: 500 }}>M. Ortiz</span>
                <span style={{ fontSize: 10, color: "var(--text-secondary)" }}>Analyst</span>
              </div>
            </div>
          </div>
        </header>
        <main style={{ padding: 20 }}>{children}</main>
      </div>
    </div>
  );
}

function App() {
  const [{ route, param }, setLoc] = useState(parseHash());
  useEffect(() => {
    const fn = () => setLoc(parseHash());
    window.addEventListener("hashchange", fn);
    return () => window.removeEventListener("hashchange", fn);
  }, []);

  if (route === "login") return <LoginScreen/>;

  let screen;
  switch (route) {
    case "dashboard": screen = <DashboardScreen/>; break;
    case "markets": screen = param ? <MarketDetailScreen slug={param}/> : <MarketsScreen/>; break;
    case "contracts": screen = param ? <ContractDetailScreen address={param}/> : <ContractsScreen/>; break;
    case "resolutions": screen = param ? <ResolutionDetailScreen slug={param}/> : <ResolutionsScreen/>; break;
    case "signals": screen = <SignalsScreen/>; break;
    case "ecosystem": screen = <EcosystemScreen/>; break;
    case "settings": screen = <SettingsScreen/>; break;
    default: screen = <DashboardScreen/>;
  }
  return <Shell route={route}>{screen}</Shell>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
